<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoLogic Ad - The Trades Are Changing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0D2137;
      --secondary: #00C2A8;
      --accent: #FFFFFF;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: var(--primary);
      font-family: 'Inter', sans-serif;
      color: var(--accent);
    }

    .ad-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      padding: 8vw;
      position: relative;
    }

    /* Logo Area */
    .logo {
      display: flex;
      align-items: center;
      gap: 1.5vw;
      margin-bottom: auto;
    }
    .logo-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 5vw;
      letter-spacing: -0.05vw;
    }
    .logo-icon {
      width: 4.5vw;
      height: 4.5vw;
      color: var(--secondary);
    }

    /* Main Content */
    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 6vw;
    }

    .headline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 11vw;
      line-height: 1.05;
      letter-spacing: -0.2vw;
      margin: 0 0 2vw 0;
      max-width: 90vw;
    }

    .sub-headline {
      font-size: 5.5vw;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      margin: 0 0 8vw 0;
      letter-spacing: -0.05vw;
    }

    /* Icons Row */
    .icons-row {
      display: flex;
      gap: 4vw;
      margin-bottom: 10vw;
      align-items: center;
    }
    
    .trade-icon {
      width: 7vw;
      height: 7vw;
      color: var(--secondary);
    }

    /* CTA Button */
    .cta-container {
      margin-top: auto;
    }
    
    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--secondary);
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 4vw;
      padding: 3.5vw 7vw;
      border-radius: 10vw;
      text-decoration: none;
      border: none;
      letter-spacing: -0.02vw;
    }
  </style>
</head>
<body>
  <div class="ad-container">
    <!-- Logo -->
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
      <div class="logo-text">EcoLogic</div>
    </div>

    <!-- Content -->
    <div class="content">
      <h1 class="headline">The trades<br>are changing.</h1>
      <p class="sub-headline">Your business should too.</p>
      
      <!-- Icons Row -->
      <div class="icons-row">
        <!-- Wrench -->
        <svg class="trade-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
        </svg>
        <!-- Lightning -->
        <svg class="trade-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <!-- Droplet -->
        <svg class="trade-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
        </svg>
        <!-- Snowflake -->
        <svg class="trade-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m20 17.5-8-4.5v-9"></path>
          <path d="m4 17.5 8-4.5 8 4.5"></path>
          <path d="m4 6.5 8 4.5v9"></path>
          <path d="m12 11 8-4.5"></path>
          <path d="m12 11-8-4.5"></path>
          <path d="m16 2.5-4 4-4-4"></path>
          <path d="m21.5 10.5-4-1 1-4"></path>
          <path d="m21.5 13.5-4 1 1 4"></path>
          <path d="m8 21.5 4-4 4 4"></path>
          <path d="m2.5 13.5 4-1-1 4"></path>
          <path d="m2.5 10.5 4 1-1-4"></path>
        </svg>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-container">
      <a href="#" class="cta-button">Join EcoLogic</a>
    </div>
  </div>
</body>
</html>
