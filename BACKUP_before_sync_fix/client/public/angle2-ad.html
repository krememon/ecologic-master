<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoLogic Ad - Everything in One Place</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0D2137;
      --secondary: #00C2A8;
      --accent: #FFFFFF;
      --surface: #091929;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: var(--primary);
      font-family: 'Inter', sans-serif;
      color: var(--accent);
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    * {
      box-sizing: inherit;
    }

    .ad-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      padding: 6vw 6vw 4vw 6vw;
      z-index: 1;
    }

    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 10;
    }

    .headline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 8vw;
      line-height: 1.1;
      margin: 0;
      color: var(--accent);
      letter-spacing: -0.2vw;
    }

    .sub-headline {
      font-size: 4.5vw;
      font-weight: 500;
      margin: 3vw 0 0 0;
      color: var(--secondary);
    }

    .visual-area {
      flex: 1;
      position: relative;
      width: 100%;
      margin-top: 4vw;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Phone Mockup */
    .phone {
      width: 32vw;
      height: 64vw;
      background-color: var(--surface);
      border-radius: 4.5vw;
      border: 1.5vw solid #1A2E44;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4vw 8vw rgba(0, 0, 0, 0.5);
      z-index: 2;
    }

    .phone-header {
      height: 8vw;
      background-color: #1A2E44;
      display: flex;
      align-items: center;
      padding: 0 3vw;
    }

    .phone-body {
      flex: 1;
      padding: 2.5vw;
      display: flex;
      flex-direction: column;
      gap: 2vw;
    }

    .phone-item {
      height: 6vw;
      background-color: #2A3E54;
      border-radius: 1vw;
      width: 100%;
    }
    
    .phone-item.accent {
      background-color: var(--secondary);
      width: 60%;
    }

    .phone-item:nth-child(2) { width: 85%; }
    .phone-item:nth-child(3) { width: 70%; }
    .phone-item:nth-child(4) { width: 90%; }
    
    .floating-badge {
      position: absolute;
      background-color: var(--secondary);
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 2.5vw;
      padding: 1.5vw 3vw;
      border-radius: 4vw;
      display: flex;
      align-items: center;
      gap: 1vw;
      box-shadow: 0 1.5vw 3vw rgba(0,0,0,0.3);
      z-index: 5;
      white-space: nowrap;
    }

    .badge-icon {
      background-color: rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 3vw;
      height: 3vw;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.8vw;
    }

    .badge-1 { top: 5vw; left: 2vw; }
    .badge-2 { top: 18vw; right: 0vw; }
    .badge-3 { bottom: 20vw; left: 1vw; }
    .badge-4 { bottom: 5vw; right: 2vw; }

    .bottom-area {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 2vw;
      width: 100%;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 1vw;
    }

    .logo-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 4vw;
      color: var(--accent);
      letter-spacing: -0.1vw;
    }

    .logo-icon {
      color: var(--secondary);
      width: 3vw;
      height: 3vw;
    }

    .cta-button {
      background-color: var(--secondary);
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 3.5vw;
      padding: 2.5vw 6vw;
      border-radius: 1.5vw;
      text-decoration: none;
      border: none;
      display: inline-block;
      cursor: pointer;
    }

    /* Abstract shapes background */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      background-color: var(--surface);
      z-index: 0;
    }

    .shape-1 {
      width: 80vw;
      height: 80vw;
      top: -20vw;
      right: -20vw;
      opacity: 0.5;
    }
    
    .shape-2 {
      width: 60vw;
      height: 60vw;
      bottom: -10vw;
      left: -20vw;
      opacity: 0.3;
    }

  </style>
</head>
<body>

  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="ad-container">
    
    <div class="content-wrapper">
      <h1 class="headline">Everything in One Place.</h1>
      <p class="sub-headline">Jobs. Invoices. Payments. Team.</p>
    </div>

    <div class="visual-area">
      
      <div class="floating-badge badge-1">
        <span>Invoice Sent</span>
        <div class="badge-icon">✓</div>
      </div>
      
      <div class="floating-badge badge-2">
        <span>Job Scheduled</span>
        <div class="badge-icon">✓</div>
      </div>
      
      <div class="floating-badge badge-3">
        <span>Payment Received</span>
        <div class="badge-icon">✓</div>
      </div>
      
      <div class="floating-badge badge-4">
        <span>Team Notified</span>
        <div class="badge-icon">✓</div>
      </div>

      <div class="phone">
        <div class="phone-header"></div>
        <div class="phone-body">
          <div class="phone-item accent"></div>
          <div class="phone-item"></div>
          <div class="phone-item"></div>
          <div class="phone-item"></div>
          <div class="phone-item"></div>
        </div>
      </div>

    </div>

    <div class="bottom-area">
      <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" />
        </svg>
        <div class="logo-text">EcoLogic</div>
      </div>
      <div class="cta-button">Try EcoLogic Free</div>
    </div>

  </div>

</body>
</html>
