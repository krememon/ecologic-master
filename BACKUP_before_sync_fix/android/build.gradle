// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.9.1'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    configurations.all {
        resolutionStrategy {
            // Force a single savedstate version across every module.
            // activity:1.11.0 pulls savedstate:1.3.0; older pins (1.9.2) pulled 1.2.x.
            // The split caused D8 to see two copies of androidx.savedstate.R$id.
            force 'androidx.savedstate:savedstate:1.3.0'
            force 'androidx.savedstate:savedstate-ktx:1.3.0'
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
