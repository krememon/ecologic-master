<!DOCTYPE html>
<html lang="en" style="background-color:#FFFFFF">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Earliest possible white paint. Inlined as the very first <style> in
         <head> so the browser applies it before any external stylesheet,
         font, script, or React bundle has loaded. Eliminates the brief black
         "first paint" the WKWebView shows while https://app.ecologicc.com is
         being fetched and parsed on cold launch. !important so the React
         theme cascade can't accidentally suppress it during the splash. -->
    <style>
      html, body, #root { background: #FFFFFF !important; }
    </style>
    <title>Contractor Management Platform</title>
    <meta name="description" content="Professional contractor management platform with AI-powered scheduling" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Contractor Platform" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <script>
      (function(){
        try {
          var t = localStorage.getItem('ui-theme');
          var isDark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme:dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0F172A';
          }
        } catch(e){}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Service workers must NEVER run inside the Capacitor native wrapper.
      // In iOS/Android the WKWebView/WebView serves bundled assets from a
      // capacitor:// or http://localhost origin; a registered SW from a previous
      // remote-URL load can intercept fetches and break the app. Only register
      // when running as a normal web page in a browser.
      var isNative =
        document.location.protocol === 'capacitor:' ||
        (window.Capacitor && window.Capacitor.isNativePlatform &&
          window.Capacitor.isNativePlatform());

      if (!isNative && 'serviceWorker' in navigator && 'PushManager' in window) {
        navigator.serviceWorker.register('/sw.js')
          .then(function(registration) {
            console.log('Service Worker registered successfully');
          })
          .catch(function(error) {
            console.log('Service Worker registration failed:', error);
          });
      } else if (isNative) {
        // Native cleanup: remove any service workers + caches that may have been
        // registered by an older build that loaded the production URL directly.
        try {
          if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) {
                r.unregister().then(function(ok) {
                  console.log('[native-cleanup] SW unregistered:', ok, r.scope);
                });
              });
            }).catch(function(e) {
              console.log('[native-cleanup] SW getRegistrations failed:', e);
            });
          }
          if (window.caches && caches.keys) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) {
                caches.delete(k).then(function(ok) {
                  console.log('[native-cleanup] cache deleted:', k, ok);
                });
              });
            }).catch(function(e) {
              console.log('[native-cleanup] caches.keys failed:', e);
            });
          }
        } catch (e) {
          console.log('[native-cleanup] error:', e);
        }
      }
    </script>
  </body>
</html>
