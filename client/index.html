<!DOCTYPE html>
<html lang="en" style="background-color:#F8FAFC">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Contractor Management Platform</title>
    <meta name="description" content="Professional contractor management platform with AI-powered scheduling" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0EA5E9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Contractor Platform" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
      html, body, #root { background-color: #F8FAFC; min-height: 100vh; }
      html.dark, html.dark body, html.dark #root { background-color: #0F172A; }
    </style>
    <script>
      (function(){
        try {
          var t = localStorage.getItem('ui-theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0F172A';
            document.body && (document.body.style.backgroundColor = '#0F172A');
          }
        } catch(e){}
      })();
    </script>
  </head>
  <body style="background-color:#F8FAFC">
    <div id="root" style="background-color:#F8FAFC;min-height:100vh"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Register service worker for push notifications
      if ('serviceWorker' in navigator && 'PushManager' in window) {
        navigator.serviceWorker.register('/sw.js')
          .then(function(registration) {
            console.log('Service Worker registered successfully');
          })
          .catch(function(error) {
            console.log('Service Worker registration failed:', error);
          });
      }
    </script>
  </body>
</html>
