<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoLogic Ad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0D2137;
      --secondary: #00C2A8;
      --accent: #FFFFFF;
      --dark: #091929;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: var(--primary);
      font-family: 'Inter', sans-serif;
      color: var(--accent);
    }

    .ad-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .split-visual {
      display: flex;
      flex: 1;
      height: 50vh;
      width: 100vw;
      position: relative;
    }

    .chaos-half {
      flex: 1;
      background-color: var(--dark);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .clean-half {
      flex: 1;
      background-color: var(--primary);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chaos-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0.5;
    }

    .chaos-icon {
      position: absolute;
      fill: #4A5568;
    }

    .ui-element {
      background-color: var(--accent);
      border-radius: 2vw;
      padding: 3vw;
      width: 30vw;
      box-shadow: 2vw 2vw 0vw rgba(0, 194, 168, 0.2);
      position: relative;
      transform: rotate(5deg);
    }

    .ui-header {
      width: 50%;
      height: 2vw;
      background-color: var(--secondary);
      border-radius: 1vw;
      margin-bottom: 3vw;
    }

    .ui-line {
      width: 100%;
      height: 1.5vw;
      background-color: #E2E8F0;
      border-radius: 1vw;
      margin-bottom: 2vw;
    }
    
    .ui-line.short {
      width: 60%;
    }

    .check-circle {
      position: absolute;
      top: -2vw;
      right: -2vw;
      width: 8vw;
      height: 8vw;
      background-color: var(--secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check-mark {
      width: 4vw;
      height: 4vw;
      stroke: var(--accent);
      stroke-width: 0.5vw;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .content {
      padding: 6vw 8vw;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      flex: 1;
      z-content: 10;
    }

    .headline {
      font-family: 'Montserrat', sans-serif;
      font-size: 8vw;
      font-weight: 800;
      line-height: 1.1;
      margin: 0 0 2vw 0;
      letter-spacing: -0.02em;
    }

    .subhead {
      font-size: 4.5vw;
      font-weight: 500;
      margin: 0 0 6vw 0;
      color: #A0AEC0;
    }

    .cta-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cta-btn {
      background-color: var(--secondary);
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 4vw;
      padding: 3.5vw 6vw;
      border: none;
      border-radius: 2vw;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 1.5vw;
    }

    .logo-icon {
      width: 5vw;
      height: 5vw;
      fill: var(--secondary);
    }

    .logo-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 4vw;
      color: var(--accent);
    }
    
    .divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 0.5vw;
      background-color: var(--secondary);
      transform: translateX(-50%);
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="ad-container">
    <div class="split-visual">
      <div class="chaos-half">
        <svg class="chaos-icons" viewBox="0 0 100 100">
          <path class="chaos-icon" style="top: 10%; left: 10%; width: 15vw;" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/>
          <path class="chaos-icon" style="top: 60%; left: 15%; width: 12vw;" d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          <path class="chaos-icon" style="top: 20%; left: 60%; width: 18vw;" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path class="chaos-icon" style="top: 70%; left: 55%; width: 14vw;" d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 6v6l4 2"/>
        </svg>
      </div>
      <div class="divider"></div>
      <div class="clean-half">
        <div class="ui-element">
          <div class="ui-header"></div>
          <div class="ui-line"></div>
          <div class="ui-line"></div>
          <div class="ui-line short"></div>
          <div class="check-circle">
            <svg class="check-mark" viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
        </div>
      </div>
    </div>
    
    <div class="content">
      <h1 class="headline">Stop Chasing Paperwork.</h1>
      <p class="subhead">Run jobs. Not invoices.</p>
      
      <div class="cta-container">
        <button class="cta-btn">Get EcoLogic Free</button>
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
          </svg>
          <span class="logo-text">EcoLogic</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
